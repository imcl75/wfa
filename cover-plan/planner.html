<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Planner — Wallscourt Farm Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; }

    .header-strip { background: #1798d3; height: 8px; }
    header {
      background: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    header img { height: 52px; }
    .header-title { font-family: 'Nunito', Arial, sans-serif; font-size: 18px; font-weight: 900; color: #1798d3; }
    .header-subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .demo-badge {
      margin-left: 10px;
      font-size: 10px;
      font-weight: bold;
      background: #fff7ed;
      color: #c2410c;
      border: 1px solid #fed7aa;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Day tabs */
    .day-tabs { display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap; }
    .day-tab {
      padding: 7px 14px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: Arial;
      font-size: 13px;
      background: #f0f8fd;
      color: #475569;
      transition: all 0.15s;
      position: relative;
    }
    .day-tab:hover { background: #e0f0fa; }
    .day-tab.active { background: #1798d3; color: white; font-weight: bold; }
    .tbc-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #ef4444;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
      margin-bottom: 1px;
    }
    .day-tab.active .tbc-dot { background: rgba(255,255,255,0.7); }

    /* Layout */
    .main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 16px 32px;
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 16px;
    }

    /* Progress */
    .progress-bar {
      background: white;
      border-radius: 8px;
      padding: 13px 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-label { font-size: 13px; color: #64748b; white-space: nowrap; }
    .progress-track { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1798d3; border-radius: 4px; transition: width 0.4s ease; }
    .progress-fill.done { background: #22c55e; }
    .progress-count { font-size: 13px; font-weight: bold; color: #1e3a8a; white-space: nowrap; min-width: 60px; text-align: right; }

    /* Slots panel */
    .slots-panel {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .session-heading {
      font-size: 11px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 22px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #f1f5f9;
    }
    .session-heading:first-child { margin-top: 0; }

    /* Slot card */
    .slot-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 13px;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1.5px solid #e2e8f0;
    }
    .slot-info { flex: 1; min-width: 0; }
    .slot-teacher { font-weight: bold; font-size: 14px; color: #111; }
    .slot-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .reason-badge {
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
    }

    /* Drop zone */
    .drop-zone {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 2px dashed #cbd5e1;
      border-radius: 5px;
      min-width: 175px;
      cursor: default;
      transition: all 0.15s;
      font-size: 12.5px;
      color: #94a3b8;
      user-select: none;
    }
    .drop-zone.ready {
      border-color: #93c5fd;
      background: #f0f8fd;
      color: #1798d3;
      animation: pulse-border 1.5s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: #93c5fd; }
      50% { border-color: #1798d3; }
    }
    .drop-zone.over {
      border-color: #1798d3;
      background: #dbeafe;
      color: #1e40af;
      transform: scale(1.03);
      animation: none;
    }

    /* Assigned */
    .assigned {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 5px;
      min-width: 175px;
      font-size: 13px;
      font-weight: bold;
      color: #166534;
    }
    .assigned .check { font-size: 14px; }
    .unassign-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 16px;
      line-height: 1;
      padding: 1px 3px;
      border-radius: 3px;
      transition: all 0.1s;
    }
    .unassign-btn:hover { color: #dc2626; background: #fee2e2; }

    /* Pre-assigned (not draggable) */
    .pre-assigned {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 5px;
      min-width: 175px;
      font-size: 12.5px;
      color: #64748b;
    }

    /* Staff panel */
    .staff-panel-card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      position: sticky;
      top: 16px;
    }
    .staff-panel-title {
      font-family: 'Nunito', Arial, sans-serif;
      font-size: 14px;
      font-weight: 900;
      color: #1e3a8a;
      margin-bottom: 3px;
    }
    .staff-panel-hint { font-size: 11px; color: #94a3b8; margin-bottom: 14px; }
    .staff-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #cbd5e1;
      font-weight: bold;
      margin: 12px 0 7px;
    }

    /* Staff card */
    .staff-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: grab;
      transition: all 0.15s;
      background: white;
      user-select: none;
    }
    .staff-card:hover:not(.busy) {
      border-color: #1798d3;
      box-shadow: 0 2px 8px rgba(23,152,211,0.18);
      transform: translateY(-1px);
    }
    .staff-card.dragging { opacity: 0.35; cursor: grabbing; }
    .staff-card.busy {
      opacity: 0.55;
      cursor: not-allowed;
      background: #f8fafc;
    }
    .staff-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      flex-shrink: 0;
    }
    .staff-name { font-weight: bold; font-size: 13px; color: #111; }
    .staff-role { font-size: 10.5px; color: #64748b; }
    .staff-assignment {
      margin-left: auto;
      font-size: 10px;
      color: #94a3b8;
      font-style: italic;
      text-align: right;
      max-width: 80px;
      line-height: 1.3;
    }

    /* All done banner */
    .all-done {
      text-align: center;
      padding: 28px 20px;
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      border-radius: 8px;
      color: #166534;
    }
    .all-done-icon { font-size: 28px; margin-bottom: 8px; }
    .all-done-title { font-family: 'Nunito', Arial, sans-serif; font-size: 16px; font-weight: 900; margin-bottom: 4px; }
    .all-done-sub { font-size: 12px; color: #4ade80; }

    /* No slots */
    .no-slots { text-align: center; padding: 40px 0; color: #94a3b8; font-size: 14px; }

    /* Year group slot colours */
    .yg-Reception { background: #dbeafe; border-color: #93c5fd; }
    .yg-Y1 { background: #ffedd5; border-color: #fb923c; }
    .yg-Y2 { background: #d1fae5; border-color: #6ee7b7; }
    .yg-Y3 { background: #fce7f3; border-color: #f9a8d4; }
    .yg-Y4 { background: #bfdbfe; border-color: #60a5fa; }
    .yg-Y5 { background: #fed7aa; border-color: #fdba74; }
    .yg-Y6 { background: #bbf7d0; border-color: #4ade80; }

    /* Reason badge colours */
    .rb-PPA         { background: #dbeafe; color: #1e40af; }
    .rb-Leadership  { background: #fef3c7; color: #92400e; }
    .rb-PhaseLead   { background: #fce7f3; color: #9d174d; }
    .rb-Training    { background: #ede9fe; color: #5b21b6; }
    .rb-ECT1        { background: #fef9c3; color: #713f12; }
    .rb-ECT2        { background: #fefce8; color: #854d0e; }
    .rb-RA          { background: #e0e7ff; color: #3730a3; }
    .rb-SENCO       { background: #f0f9ff; color: #0c4a6e; }
    .rb-Other       { background: #f3f4f6; color: #374151; }

    footer { text-align: center; font-size: 11px; color: #cbd5e1; padding: 16px 0 28px; }
  </style>
</head>
<body>

<div class="header-strip"></div>
<header>
  <img src="logo.png" alt="Wallscourt Farm Academy">
  <div>
    <div class="header-title">Cover Planner <span class="demo-badge">Concept</span></div>
    <div class="header-subtitle">Drag staff onto TBC slots to assign cover</div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>

<div class="main">
  <div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="slots-panel" id="slotsPanel"></div>
  </div>
  <div>
    <div class="staff-panel-card" id="staffPanel"></div>
  </div>
</div>

<footer>Wallscourt Farm Academy · Cover Planner · Concept Demo — not connected to live data</footer>

<script>
  // ── Mock data ───────────────────────────────────────────────────────────────

  const SESSIONS = ['Before School', 'AM', 'Lunch', 'PM', 'After School'];
  const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

  const INITIAL_SLOTS = [
    // Monday
    { id: 1,  day: 'Monday',    session: 'AM',  teacherOut: 'Leyla',   yg: null,  reason: 'Phase Lead', cover: null },
    { id: 2,  day: 'Monday',    session: 'PM',  teacherOut: 'Jamie',   yg: null,  reason: 'ECT1',       cover: 'Theresa' },

    // Tuesday
    { id: 3,  day: 'Tuesday',   session: 'AM',  teacherOut: 'Jess',    yg: 'Y1',  reason: 'PPA',        cover: null },
    { id: 4,  day: 'Tuesday',   session: 'AM',  teacherOut: 'Sarah M', yg: 'Y2',  reason: 'PPA',        cover: 'Laura' },
    { id: 5,  day: 'Tuesday',   session: 'PM',  teacherOut: 'Innes',   yg: 'Y4',  reason: 'RA',         cover: null },
    { id: 6,  day: 'Tuesday',   session: 'PM',  teacherOut: 'Clare K', yg: 'Y3',  reason: 'PPA',        cover: 'Lutz Mae' },
    { id: 7,  day: 'Tuesday',   session: 'PM',  teacherOut: 'Laura',   yg: 'Y2',  reason: 'PPA',        cover: null },
    { id: 8,  day: 'Tuesday',   session: 'PM',  teacherOut: 'Jon',     yg: 'Y6',  reason: 'Phase Lead', cover: null },

    // Wednesday
    { id: 9,  day: 'Wednesday', session: 'AM',  teacherOut: 'Lutz Mae',yg: 'Y3',  reason: 'PPA',        cover: null },
    { id: 10, day: 'Wednesday', session: 'AM',  teacherOut: 'Ellen',   yg: null,  reason: 'SENCO',      cover: null },
    { id: 11, day: 'Wednesday', session: 'PM',  teacherOut: 'Ellen',   yg: null,  reason: 'SENCO',      cover: null },

    // Thursday
    { id: 12, day: 'Thursday',  session: 'AM',  teacherOut: 'Innes',   yg: 'Y4',  reason: 'PPA',        cover: null },
    { id: 13, day: 'Thursday',  session: 'AM',  teacherOut: 'William', yg: 'Y4',  reason: 'PPA',        cover: 'Supply (Jono)' },
    { id: 14, day: 'Thursday',  session: 'PM',  teacherOut: 'Eloise',  yg: 'Y5',  reason: 'PPA',        cover: 'AB Sports' },
    { id: 15, day: 'Thursday',  session: 'PM',  teacherOut: 'Ellie',   yg: 'Y5',  reason: 'PPA',        cover: 'AB Sports' },
    { id: 16, day: 'Thursday',  session: 'PM',  teacherOut: 'Sarah M', yg: 'Y2',  reason: 'Phase Lead', cover: null },
    { id: 17, day: 'Thursday',  session: 'PM',  teacherOut: 'Reuben',  yg: 'Y3',  reason: 'Phase Lead', cover: null },
    { id: 18, day: 'Thursday',  session: 'PM',  teacherOut: 'Jon',     yg: 'Y6',  reason: 'PPA',        cover: null },
    { id: 19, day: 'Thursday',  session: 'PM',  teacherOut: 'Sally',   yg: 'Y6',  reason: 'PPA',        cover: null },

    // Friday
    { id: 20, day: 'Friday',    session: 'AM',  teacherOut: 'Reuben',  yg: 'Y3',  reason: 'PPA',        cover: null },
    { id: 21, day: 'Friday',    session: 'AM',  teacherOut: 'Jamie',   yg: null,  reason: 'PPA',        cover: 'Theresa' },
    { id: 22, day: 'Friday',    session: 'PM',  teacherOut: 'Ellen',   yg: null,  reason: 'SENCO',      cover: null },
  ];

  const STAFF = [
    { id: 'ellen',    name: 'Ellen',    role: 'Cover Teacher',    initials: 'EL', colour: '#1798d3' },
    { id: 'theresa',  name: 'Theresa',  role: 'Teaching Partner', initials: 'TH', colour: '#7c3aed' },
    { id: 'chelsea',  name: 'Chelsea',  role: 'Teaching Partner', initials: 'CH', colour: '#0891b2' },
    { id: 'catherine',name: 'Catherine',role: 'Teaching Partner', initials: 'CA', colour: '#059669' },
    { id: 'kerry',    name: 'Kerry',    role: 'Teaching Partner', initials: 'KE', colour: '#d97706' },
    { id: 'sam',      name: 'Sam',      role: 'Teaching Partner', initials: 'SA', colour: '#dc2626' },
    { id: 'alasdair', name: 'Alasdair', role: 'Teaching Partner', initials: 'AL', colour: '#7c2d12' },
    { id: 'hettie',   name: 'Hettie',   role: 'Teaching Partner', initials: 'HE', colour: '#be185d' },
  ];

  // ── State ───────────────────────────────────────────────────────────────────

  const state = {
    selectedDay: 'Thursday',
    slots: JSON.parse(JSON.stringify(INITIAL_SLOTS)),
    draggingId: null, // staff id being dragged
  };

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function ygClass(yg) { return yg ? 'yg-' + yg : ''; }

  function rbClass(reason) {
    const map = { 'PPA':'PPA', 'Phase Lead':'PhaseLead', 'Leadership':'Leadership',
                  'Training':'Training', 'ECT1':'ECT1', 'ECT2':'ECT2',
                  'RA':'RA', 'SENCO':'SENCO' };
    return 'rb-' + (map[reason] || 'Other');
  }

  function daySlots(day) {
    return state.slots.filter(s => s.day === day);
  }

  function tbcCount(day) {
    return daySlots(day).filter(s => !s.cover).length;
  }

  // Staff assignments for the selected day (from draggable staff, not pre-assigned)
  function staffAssignments(day) {
    const assigned = {};
    state.slots.filter(s => s.day === day && s.cover && s._assigned).forEach(s => {
      assigned[s.cover] = assigned[s.cover] || [];
      assigned[s.cover].push(s.session + ' — ' + s.teacherOut);
    });
    return assigned;
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  function render() {
    renderDayTabs();
    renderProgress();
    renderSlots();
    renderStaff();
  }

  function renderDayTabs() {
    const el = document.getElementById('dayTabs');
    el.innerHTML = DAYS.map(day => {
      const tbc = tbcCount(day);
      const active = day === state.selectedDay ? 'active' : '';
      const dot = tbc > 0 ? `<span class="tbc-dot" title="${tbc} TBC"></span>` : '';
      return `<button class="day-tab ${active}" onclick="selectDay('${day}')">${day.slice(0,3)}${dot}</button>`;
    }).join('');
  }

  function renderProgress() {
    const slots = daySlots(state.selectedDay);
    const total = slots.length;
    const covered = slots.filter(s => s.cover).length;
    const tbc = total - covered;
    const pct = total > 0 ? Math.round((covered / total) * 100) : 100;
    const done = tbc === 0;
    document.getElementById('progressBar').innerHTML = `
      <span class="progress-label">${state.selectedDay} — cover</span>
      <div class="progress-track">
        <div class="progress-fill ${done ? 'done' : ''}" style="width:${pct}%"></div>
      </div>
      <span class="progress-count" style="color:${done ? '#166534' : '#1e3a8a'}">
        ${done ? '✓ All covered' : `${tbc} TBC`}
      </span>`;
  }

  function renderSlots() {
    const slots = daySlots(state.selectedDay);
    const isDragging = state.draggingId !== null;
    const el = document.getElementById('slotsPanel');

    if (slots.length === 0) {
      el.innerHTML = '<div class="no-slots">No cover arrangements for this day.</div>';
      return;
    }

    let html = '';
    SESSIONS.forEach(session => {
      const sessionSlots = slots.filter(s => s.session === session);
      if (sessionSlots.length === 0) return;
      html += `<div class="session-heading">${session}</div>`;
      sessionSlots.forEach(slot => {
        const ygc = ygClass(slot.yg);
        const rbc = rbClass(slot.reason);
        let coverHtml;

        if (slot.cover && slot._assigned) {
          // Assigned by drag-and-drop — can unassign
          coverHtml = `
            <div class="assigned">
              <span class="check">✓</span>
              <span>${slot.cover}</span>
              <button class="unassign-btn" onclick="unassign(${slot.id})" title="Remove assignment">×</button>
            </div>`;
        } else if (slot.cover) {
          // Pre-assigned in data — not editable in this demo
          coverHtml = `<div class="pre-assigned">→ ${slot.cover}</div>`;
        } else {
          // TBC — drop zone
          const over = isDragging ? 'ready' : '';
          coverHtml = `
            <div class="drop-zone ${over}" id="drop-${slot.id}"
              ondragover="onDragOver(event, ${slot.id})"
              ondragleave="onDragLeave(event, ${slot.id})"
              ondrop="onDrop(event, ${slot.id})">
              <span style="font-size:15px">＋</span>
              <span>Drop staff here</span>
            </div>`;
        }

        html += `
          <div class="slot-card ${ygc}">
            <div class="slot-info">
              <div class="slot-teacher">${slot.teacherOut}${slot.yg ? ` <span style="font-weight:normal;font-size:12px;color:#555">(${slot.yg})</span>` : ''}</div>
              <div class="slot-meta"><span class="reason-badge ${rbc}">${slot.reason}</span></div>
            </div>
            ${coverHtml}
          </div>`;
      });
    });

    el.innerHTML = html;
  }

  function renderStaff() {
    const assignments = staffAssignments(state.selectedDay);
    const available = STAFF.filter(s => !assignments[s.name]);
    const busy = STAFF.filter(s => assignments[s.name]);
    const el = document.getElementById('staffPanel');

    let html = `
      <div class="staff-panel-title">Available Staff</div>
      <div class="staff-panel-hint">Drag a name onto a TBC slot to assign</div>`;

    if (available.length > 0) {
      available.forEach(s => {
        const dragging = state.draggingId === s.id ? 'dragging' : '';
        html += staffCard(s, dragging, false, null);
      });
    }

    if (busy.length > 0) {
      html += `<div class="staff-section-label">Already assigned today</div>`;
      busy.forEach(s => {
        const label = (assignments[s.name] || []).join(', ');
        html += staffCard(s, '', true, label);
      });
    }

    el.innerHTML = html;
  }

  function staffCard(s, extraClass, isBusy, assignment) {
    const cls = `staff-card ${extraClass || ''} ${isBusy ? 'busy' : ''}`;
    const drag = isBusy ? '' : `draggable="true" ondragstart="onDragStart(event,'${s.id}')" ondragend="onDragEnd()"`;
    const label = assignment
      ? `<span class="staff-assignment">${assignment}</span>` : '';
    return `
      <div class="${cls}" ${drag} id="staff-${s.id}">
        <div class="staff-avatar" style="background:${s.colour}">${s.initials}</div>
        <div>
          <div class="staff-name">${s.name}</div>
          <div class="staff-role">${s.role}</div>
        </div>
        ${label}
      </div>`;
  }

  // ── Events ──────────────────────────────────────────────────────────────────

  function selectDay(day) {
    state.selectedDay = day;
    render();
  }

  function onDragStart(e, staffId) {
    state.draggingId = staffId;
    e.dataTransfer.effectAllowed = 'copy';
    // Re-render slightly delayed so the drag image captures before opacity change
    setTimeout(() => render(), 0);
  }

  function onDragEnd() {
    state.draggingId = null;
    render();
  }

  function onDragOver(e, slotId) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    const el = document.getElementById('drop-' + slotId);
    if (el) el.classList.add('over');
  }

  function onDragLeave(e, slotId) {
    const el = document.getElementById('drop-' + slotId);
    if (el) el.classList.remove('over');
  }

  function onDrop(e, slotId) {
    e.preventDefault();
    const staffId = state.draggingId;
    if (!staffId) return;
    const staff = STAFF.find(s => s.id === staffId);
    if (!staff) return;
    const slot = state.slots.find(s => s.id === slotId);
    if (!slot || slot.cover) return;
    slot.cover = staff.name;
    slot._assigned = true;
    state.draggingId = null;
    render();
  }

  function unassign(slotId) {
    const slot = state.slots.find(s => s.id === slotId);
    if (slot && slot._assigned) {
      slot.cover = null;
      slot._assigned = false;
      render();
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────────

  render();
</script>
</body>
</html>
